# herdr configuration
# Tuned to mirror ~/.tmux.conf where Herdr has equivalent concepts.

# First-run setup is done; keep startup quiet.
onboarding = false

[theme]
# Built-in Tokyo Night theme.
name = "tokyo-night"

auto_switch = false
[theme.custom]
# Tokyo Night Storm palette, adapted to Herdr's semantic color roles.
panel_bg = "#24283b"
# Herdr uses surface_dim for the active agent row. Storm's blue7 makes the
# currently focused workspace/tab/pane remain visibly selected.
surface_dim = "#394b70"
surface0 = "#3b4261"
surface1 = "#414868"
text = "#c0caf5"
subtext0 = "#a9b1d6"
overlay1 = "#a9b1d6"
# Herdr uses overlay0 for unfocused pane borders and secondary labels. Tokyo
# Night's muted comment gray keeps inactive panes subordinate to the blue focus.
overlay0 = "#565f89"
accent = "#7aa2f7"
blue = "#7aa2f7"
teal = "#7dcfff"
mauve = "#bb9af7"
green = "#9ece6a"
yellow = "#e0af68"
peach = "#ff9e64"
red = "#f7768e"

[terminal]
# Match tmux's practical behavior: inherit shell and start new panes/tabs in the current context.
default_shell = ""
shell_mode = "auto"
new_cwd = "follow"

[update]
channel = "stable"
version_check = true
manifest_check = true

[keys]
# ~/.tmux.conf uses Ctrl-Space as the prefix.
prefix = "ctrl+space"

# Prefix-mode basics, kept close to tmux defaults/muscle memory.
help = "prefix+?"
settings = "prefix+s"
detach = ["prefix+q", "prefix+d"]
reload_config = "prefix+shift+r"
open_notification_target = ""
workspace_picker = "prefix+w"
goto = "prefix+g"

# Workspaces are Herdr's session-ish grouping layer.
new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+g"
open_worktree = "prefix+alt+o"
remove_worktree = "prefix+alt+d"
rename_workspace = "prefix+m"
close_workspace = "prefix+shift+d"
previous_workspace = "prefix+h"
next_workspace = "prefix+l"
previous_agent = "prefix+k"
next_agent = "prefix+j"
focus_agent = ""
remote_image_paste = "ctrl+v"

# Tabs map most closely to tmux windows.
new_tab = "prefix+c"
rename_tab = "prefix+comma"
previous_tab = "ctrl+alt+h"   # tmux: C-M-h previous-window
next_tab = "ctrl+alt+l"       # tmux: C-M-l next-window
# Use super so the same config works on Linux; on macOS terminals this is Cmd when reported as super/cmd.
switch_tab = "super+1..9"              # super/cmd + 1..9 switches to tabs 1..9
switch_workspace = "super+shift+1..9"  # shift+super/cmd + 1..9 switches to workspaces 1..9
close_tab = "prefix+shift+x"

# Panes. Direct Ctrl-h/j/k/l mirrors tmux config. Prefix+j/k/h/l are reserved
# for Herdr agent/workspace switching where configured.
rename_pane = "prefix+period"
edit_scrollback = "prefix+e"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
last_pane = ""
# tmux-style splits: % for side-by-side, " for stacked.
split_vertical = "prefix+%"
split_horizontal = "prefix+\""
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

# Navigate mode uses vi-style movement like the tmux pane bindings.
navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

# Redundant tmux-style split aliases: | for side-by-side, - for stacked.
[[keys.command]]
key = "prefix+|"
type = "shell"
command = "herdr pane split --direction right --current --focus"

[[keys.command]]
key = "prefix+minus"
type = "shell"
command = "herdr pane split --direction down --current --focus"

# Herdr has no first-class prefix+H/J/K/L resize bindings, so use CLI commands.
[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = "herdr pane resize --direction left --amount 5 --current"

[[keys.command]]
key = "prefix+shift+j"
type = "shell"
command = "herdr pane resize --direction down --amount 5 --current"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "herdr pane resize --direction up --amount 5 --current"

[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "herdr pane resize --direction right --amount 5 --current"

# Keep your lazygit helper from Herdr's default example.
[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"

[keys.indexed]
tabs = ""
workspaces = ""
agents = ""

[worktrees]
directory = "~/.herdr/worktrees"

[ui]
# tmux has mouse enabled, visible pane borders, bottom status, quiet bells.
mouse_capture = true
right_click_passthrough_modifier = ""
mouse_scroll_lines = 3
redraw_on_focus_gained = true
confirm_close = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = false
agent_panel_sort = "priority"
accent = "#7aa2f7"
sidebar_width = 34
sidebar_min_width = 18
sidebar_max_width = 46
mobile_width_threshold = 64

# Prefer meaningful pane/session context over repeated workspace names in the Agents panel.
[ui.sidebar.agents]
row_gap = 1
rows = [
  ["state_icon", "workspace", "tab"],
  ["pane", "agent"],
]

[ui.sidebar.agents.rows_by_agent]
# Pi reports its session name as the pane title. Herdr drops missing values, so
# this order falls back through: Pi session/pane name -> tab -> workspace.
pi = [
  ["state_icon", "pane", "tab", "workspace"],
]

[ui.toast]
# tmux config disables activity/bell noise; keep Herdr popups off too.
delivery = "system"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
# Enable Herdr's built-in agent done / needs-attention sounds.
enabled = true

[session]
resume_agents_on_restore = true

[remote]
# Keep Herdr's generated SSH bridge config for remote attach keepalives.
manage_ssh_config = true

[experimental]
allow_nested = false
kitty_graphics = false
# Better approximation of tmux's large history-limit behavior across restarts.
pane_history = true
# Make prefix mode usable with non-ASCII input sources on macOS.
switch_ascii_input_source_in_prefix = true
# Expose cursor anchoring for agent TUIs that hide/paint their own cursor.
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["pi", "opencode"]
cjk_ime_cursor_shape = "steady_block"

[advanced]
# tmux history-limit is 100000 lines. Herdr uses bytes, so this is a generous approximation.
scrollback_limit_bytes = 100000000

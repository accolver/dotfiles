# Unbind the default prefix
unbind C-b

# Set new prefix to Ctrl + Space
set -g prefix C-Space

# Allow more advanced usage with modifier keys
set -g extended-keys on
set -g extended-keys-format csi-u

# Ensure tmux recognizes the new prefix
bind C-Space send-prefix

##### Basics #####
set -g mouse on

# (Optional) Let passthrough terminals work (tmux ≥ 3.4)
set -g allow-passthrough on

# Let OSC 8 hyperlinks pass through tmux so terminal Cmd-click can open them.
# This helps with links emitted by modern CLIs/editors while keeping tmux mouse support.
set -as terminal-features ',*:hyperlinks'

# Keep some env vars updated inside tmux
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

##### Terminal / Colors #####
# Use modern terminfo; make sure you have tmux-256color available on your system.
set -g default-terminal "tmux-256color"

# Enable 24-bit color in common terminals
set -as terminal-overrides ',*:Tc'
set -ga terminal-overrides ',xterm*:Tc'
set -ga terminal-overrides ',tmux-256color:Tc'

##### Status bar: show "session: window" on the left #####
# Left side shows: session name (#S) : window name (#W)
set -g status-left '#S: #W'
set -g status-left-length 60

# Clear the right side (you can add time/host later if you want)
set -g status-right ''

# Hide the middle window list so only the left segment is visible
set -g window-status-format ''
set -g window-status-current-format ''

##### Window naming: use current working directory #####
# Auto-rename windows to the basename of the active pane's path
#setw -g automatic-rename-format '#{b:pane_current_path}'
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'

##### Pane navigation (Ctrl + h/l)
# unbind -n C-j
# unbind -n C-k

# Let nvim/vim handle C-h/j/k/l; otherwise use them for tmux pane navigation
bind -n C-h if-shell -F '#{||:#{pane_in_mode},#{m:*vim*,#{pane_current_command}}}' 'send-keys C-h' 'select-pane -L'
# This one messes up shift+enter in terminal setting
# bind -n C-j if-shell -F '#{||:#{pane_in_mode},#{m:*vim*,#{pane_current_command}}}' 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell -F '#{||:#{pane_in_mode},#{m:*vim*,#{pane_current_command}}}' 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell -F '#{||:#{pane_in_mode},#{m:*vim*,#{pane_current_command}}}' 'send-keys C-l' 'select-pane -R'

##### Pane resizing (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# (Optional) snappier key handling
set -s escape-time 0
set -g focus-events on

# bind -n C-h select-pane -L
# # bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

##### Window navigation (Ctrl + Alt + h/l)
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Move windows with ctrl+shift left/right
bind -n C-S-h swap-window -t -1
bind -n C-S-l swap-window -t +1

# Automatically reorder windows if one is deleted
set-option -g renumber-windows on

# Start windows at 1 instead of 0
set -g base-index 1

# Start pane numbering at 1 instead of 0
setw -g pane-base-index 1

##### Direct Super/Cmd number navigation #####
# Ghostty sends these Super/Cmd chords as CSI-u sequences. tmux does not have
# first-class Super key names, so map the sequences to User keys.
# Super/Cmd + 1..9 switches tmux windows (tabs) 1..9.
set -s user-keys[0]  "\e[49;9u"
set -s user-keys[1]  "\e[50;9u"
set -s user-keys[2]  "\e[51;9u"
set -s user-keys[3]  "\e[52;9u"
set -s user-keys[4]  "\e[53;9u"
set -s user-keys[5]  "\e[54;9u"
set -s user-keys[6]  "\e[55;9u"
set -s user-keys[7]  "\e[56;9u"
set -s user-keys[8]  "\e[57;9u"
bind -n User0 select-window -t :=1
bind -n User1 select-window -t :=2
bind -n User2 select-window -t :=3
bind -n User3 select-window -t :=4
bind -n User4 select-window -t :=5
bind -n User5 select-window -t :=6
bind -n User6 select-window -t :=7
bind -n User7 select-window -t :=8
bind -n User8 select-window -t :=9

# Shift + Super/Cmd + 1..9 switches to the 1st..9th tmux sessions.
set -s user-keys[9]  "\e[49;10u"
set -s user-keys[10] "\e[50;10u"
set -s user-keys[11] "\e[51;10u"
set -s user-keys[12] "\e[52;10u"
set -s user-keys[13] "\e[53;10u"
set -s user-keys[14] "\e[54;10u"
set -s user-keys[15] "\e[55;10u"
set -s user-keys[16] "\e[56;10u"
set -s user-keys[17] "\e[57;10u"
bind -n User9  run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "1p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User10 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "2p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User11 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "3p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User12 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "4p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User13 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "5p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User14 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "6p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User15 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "7p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User16 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "8p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'
bind -n User17 run-shell -b 'sid="$(tmux list-sessions -F "##{session_id}" | sed -n "9p")"; [ -n "$sid" ] && tmux switch-client -t "$sid"'

# Scrollback size
set -g history-limit 100000

##### Optional: shell behavior #####
# If you previously set a default-command to $SHELL, you usually don't need it.
# Uncomment if you really want tmux to always start your login shell explicitly.
# set -g default-command "${SHELL}"

